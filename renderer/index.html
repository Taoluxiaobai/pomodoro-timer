<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Title -->
    <h1 class="title">🍅 Pomodoro</h1>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <button class="mode-btn active" data-mode="work">专注</button>
      <button class="mode-btn" data-mode="shortBreak">短休息</button>
      <button class="mode-btn" data-mode="longBreak">长休息</button>
    </div>

    <!-- Timer Circle -->
    <div class="timer-circle-container">
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90" />
        <circle class="ring-progress" cx="100" cy="100" r="90" />
      </svg>
      <div class="timer-display">
        <span class="timer-text" id="timerText">25:00</span>
      </div>
    </div>

    <!-- Session Dots -->
    <div class="session-dots" id="sessionDots">
      <span class="dot completed"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p class="session-label">今日完成: <span id="sessionCount">0</span> 个番茄</p>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn btn-primary" id="btnStart" title="开始">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21" />
        </svg>
      </button>
      <button class="ctrl-btn btn-secondary" id="btnPause" title="暂停" disabled>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <rect x="5" y="3" width="5" height="18" />
          <rect x="14" y="3" width="5" height="18" />
        </svg>
      </button>
      <button class="ctrl-btn btn-secondary" id="btnReset" title="重置">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
        </svg>
      </button>
      <button class="ctrl-btn btn-secondary" id="btnSkip" title="跳过">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
        </svg>
      </button>
    </div>

    <!-- Always on Top Toggle -->
    <div class="options">
      <label class="toggle-label">
        <input type="checkbox" id="toggleOnTop">
        <span class="toggle-text">窗口置顶</span>
      </label>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
